# ====================================
# PUBLICATION CATEGORY CONFIGURATION
# ====================================
publication_category:
  books:
    title: "Books"
  manuscripts:
    title: "Journal Articles"
  conferences:
    title: "Conference Papers"

# ========================
# SITE BEHAVIOR SETTINGS
# ========================
# Appearance Settings
minimal_mistakes_skin: "default"  # Default theme skin
search: false                     # Disable search functionality
breadcrumbs: false               # Disable breadcrumb navigation

# Reading & Content
words_per_minute: 160
future: true
read_more: "disabled"

# Additional Features
talkmap_link: false
comments:
  provider: false                # Disable comments

# ========================
# FILE MANAGEMENT SETTINGS
# ========================
include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - CHANGELOG
  - LICENSE
  - node_modules
  - package.json*
  - README
  - vendor

keep_files:
  - .git
  - .svn

# ========================
# CONTENT PROCESSING
# ========================
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Markdown Processor
markdown: kramdown
highlighter: rouge
excerpt_separator: "\n\n"
incremental: false

# ========================
# COLLECTIONS CONFIGURATION
# ========================
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# ========================
# DEFAULT LAYOUT SETTINGS
# ========================
defaults:
  # Posts Defaults
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
  
  # Pages Defaults
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  
  # Teaching Defaults
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
  
  # Publications Defaults
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
  
  # Talks Defaults
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true

# ========================
# STYLING & OUTPUT SETTINGS
# ========================
sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: Etc/UTC

# ========================
# PLUGINS CONFIGURATION
# ========================
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jemoji

# Archive Settings
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
