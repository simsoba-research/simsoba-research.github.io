# ========================
# BASIC SITE CONFIGURATION
# ========================
locale: "en-US"
theme: "minimal-mistakes-jekyll"
title: "Kouyakou-Abalo SIMSOBA"
title_separator: "-"
name: "Kouyakou-Abalo SIMSOBA"
description: "Google DeepMind Scholar | AI for Science Researcher"

# =====================
# SITE URL & REPOSITORY
# =====================
url: "https://simsoba-research.github.io"
baseurl: ""
repository: "simsoba-research/simsoba-research.github.io"

# ====================================
# AUTHOR PROFILE - SIDEBAR INFORMATION
# ====================================
author:
  name: "Kouyakou-Abalo SIMSOBA"
  avatar: "/assets/images/profile.png"
  bio: |
    Google DeepMind Scholar |
    M.Sc. Mathematics (PAUSTI, African Union Scholar) |
    MSc in AI for Science at Stellenbosch University
  location: "Cape Town, South Africa"
  employer: "AIMS, South Africa"
  email: "kouyakou@aims.ac.za"

  # Academic & Professional Links
  googlescholar: "https://scholar.google.com/citations?hl=en&user=RtYAMMoAAAAJ"
  orcid: "0009-0005-4050-5040"
  researchgate: "Kouyakou-Abalo-Simsoba"
  github: "Abalo39"
  linkedin: "abalo-simsoba-803a75244"

# ========================
# SITE BEHAVIOR SETTINGS
# ========================
minimal_mistakes_skin: "default"
search: false
breadcrumbs: false
words_per_minute: 160
future: true
read_more: "disabled"

comments:
  provider: null

# ========================
# FILE MANAGEMENT SETTINGS
# ========================
include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - node_modules
  - package.json*
  - README
  - vendor

# ========================
# CONTENT PROCESSING
# ========================
encoding: "utf-8"
markdown: kramdown
highlighter: rouge
excerpt_separator: "\n\n"

# ========================
# COLLECTIONS
# ========================
collections:
  teaching:
    output: true
    permalink: /teaching/:path/
  publications:
    output: true
    permalink: /publications/:path/
  talks:
    output: true
    permalink: /talks/:path/

# ========================
# DEFAULT LAYOUTS
# ========================
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true

# ========================
# PAGINATION (REQUIRED)
# ========================
paginate: 5
paginate_path: /page:num/

# ========================
# STYLING & OUTPUT
# ========================
sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: Africa/Johannesburg

# ========================
# PLUGINS (GITHUB PAGES SAFE)
# ========================
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jemoji
